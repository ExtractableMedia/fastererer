name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required for super-linter to diff against the
          # base branch when VALIDATE_ALL_CODEBASE is false.
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: origin/main # checkout sets up the remote ref, not a local branch
          VALIDATE_ALL_CODEBASE: false # only validate changed or created files
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true
          VALIDATE_BASH: true
          VALIDATE_BASH_EXEC: true
          VALIDATE_GITHUB_ACTIONS: true

  # Separate job (vs super-linter's VALIDATE_RUBY) so rubocop runs from our own
  # bundle — guarantees CI uses the version and extensions pinned in
  # Gemfile.lock, staying in lockstep with `bin/rubocop` locally even if
  # super-linter's bundled rubocop drifts from ours.
  rubocop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true
      - name: Run RuboCop
        run: bin/rubocop

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bin/rspec
