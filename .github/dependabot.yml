version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - mattmenefee
    open-pull-requests-limit: 10
    groups:
      rubocop:
        patterns:
          - "rubocop"
          - "rubocop-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - mattmenefee
    open-pull-requests-limit: 5
