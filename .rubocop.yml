plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

inherit_mode:
  merge:
    - Exclude

AllCops:
  NewCops: enable
  DisplayCopNames: true
  DisplayStyleGuide: true
  Include:
    - '**/Rakefile'
  Exclude:
    - 'spec/support/**/*'
    - 'spec/spec_helper.rb'

Layout/LineLength:
  Max: 100

Style/Documentation:
  Enabled: false
