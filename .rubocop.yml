plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

inherit_mode:
  merge:
    - Exclude

AllCops:
  NewCops: enable
  DisplayCopNames: true
  DisplayStyleGuide: true
  Exclude:
    - 'spec/support/**/*'

Layout/LineLength:
  Max: 100

Style/Documentation:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

# Analyzer specs are organized by speedup scenario (one file per scenario) rather than by class,
# so their paths intentionally diverge from the described class name.
RSpec/SpecFilePathFormat:
  Exclude:
    - 'spec/lib/fastererer/analyzer/**/*_spec.rb'
